server:
  port: 8080

spring:
  application:
    name: training-backend
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/ORCL
    username: ecms
    password: ecms
    driver-class-name: oracle.jdbc.OracleDriver

app:
