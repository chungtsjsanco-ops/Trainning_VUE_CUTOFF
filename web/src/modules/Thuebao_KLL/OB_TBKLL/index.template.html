<div class="kll-page">
  <div class="kll-page__header mb-3">
    <h5 class="kll-page__title mb-0">Thuê bao KLL / OB thuê bao KLL</h5>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-body py-3">
      <div class="row align-items-end">
        <div class="col-md-3 mb-2 mb-md-0">
          <label class="form-label mb-1">Thời gian *</label>
          <b-form-input
            v-model="filterDate"
            type="date"
            size="sm"
          />
        </div>
        <div class="col-md-2">
          <b-button
            variant="primary"
            size="sm"
            class="px-4"
            @click="onSearch"
          >
            Xem
          </b-button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header py-2 kll-table__header">
      <strong>DANH SÁCH THUÊ BAO KLL</strong>
    </div>
    <div class="card-body p-0">
      <b-table
        :items="items"
        :fields="fields"
        bordered
        small
        responsive="sm"
        hover
        show-empty
        empty-text="Chưa có dữ liệu nào"
        class="mb-0 kll-table"
      >
        <template #cell(index)="data">
          {{ data.index + 1 }}
        </template>
        <template #cell(note)="data">
          <b-button
            size="sm"
            variant="outline-secondary"
            class="mr-1"
            v-b-tooltip.hover
            title="Thuê bao KLL không cần OB"
            @click="openNoObModal(data.item)"
          >
            <i class="fa fa-ban"></i>
          </b-button>
          <b-button
            size="sm"
            variant="outline-primary"
            v-b-tooltip.hover
            title="OB thuê bao KLL"
            @click="openObModal(data.item)"
          >
            <i class="fa fa-phone"></i>
          </b-button>
        </template>
      </b-table>
    </div>
  </div>

  <!-- Modal: Thuê bao KLL không cần OB -->
  <b-modal
    v-model="showNoObModal"
    title="Thuê bao KLL không cần OB"
    size="lg"
    hide-footer
  >
    <KLLNoObForm
      :record="selectedRecord"
      :prm-ngay="prmNgayForOb"
      :prm-nguoi-capnhat="prmNguoiCapnhatForOb"
      @close="showNoObModal = false"
      @saved="onSearch"
    />
  </b-modal>

  <!-- Modal: OB thuê bao KLL -->
  <b-modal
    v-model="showObModal"
    title="OB thuê bao KLL"
    size="lg"
    hide-footer
  >
    <KLLObForm
      :record="selectedRecord"
      :prm-ngay="prmNgayForOb"
      :prm-nguoi-capnhat="prmNguoiCapnhatForOb"
      @close="showObModal = false"
      @saved="onSearch"
    />
  </b-modal>
</div>
