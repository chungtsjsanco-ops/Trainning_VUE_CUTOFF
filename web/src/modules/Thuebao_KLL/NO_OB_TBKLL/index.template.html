<div class="kll-page">
  <div class="kll-page__header mb-3">
    <h5 class="kll-page__title mb-0">Thuê bao KLL / Danh sách thuê bao không xác minh</h5>
  </div>

  <!-- Khối tìm kiếm theo Mã tb -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-3">
      <div class="row align-items-end">
        <div class="col-md-4 mb-2 mb-md-0">
          <label class="form-label mb-1">Mã tb</label>
          <b-form-input v-model.trim="maTb" size="sm" placeholder="Nhập mã thuê bao" />
        </div>
        <div class="col-md-2">
          <b-button
            variant="primary"
            size="sm"
            class="px-4"
            :disabled="loadingSearch"
            @click="onSearchByMaTb"
          >
            <b-spinner small v-if="loadingSearch" class="mr-1" />
            Tìm kiếm
          </b-button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-header py-2 kll-table__header">
      <strong>DANH SÁCH THUÊ BAO KLL</strong>
    </div>
    <div class="card-body p-0">
      <b-table
        :items="searchItems"
        :fields="searchFields"
        bordered
        small
        responsive="sm"
        hover
        show-empty
        empty-text="Chưa có dữ liệu nào"
        class="mb-0 kll-table"
      >
        <template #cell(index)="data">
          {{ data.index + 1 }}
        </template>
        <template #cell(note)="data">
          <b-button
            size="sm"
            variant="outline-secondary"
            class="mr-1"
            v-b-tooltip.hover
            title="Thuê bao KLL không cần OB"
            @click="openNoObModal(data.item)"
          >
          <img src="@/assets/danhmuc.png" style="width:16px; height:16px;" />
          </b-button>
        </template>
      </b-table>
    </div>
  </div>

  <!-- Danh sách thuê bao không xác minh -->
  <div class="card shadow-sm">
    <div class="card-header py-2 kll-table__header">
      <strong>DANH SÁCH THUÊ BAO KHÔNG XÁC MINH</strong>
    </div>
    <div class="card-body pt-2">
    </div>
    <div class="card-body p-0">
      <b-table
        :items="listItems"
        :fields="listFields"
        bordered
        small
        responsive="sm"
        hover
        show-empty
        empty-text="Chưa có dữ liệu nào"
        class="mb-0 kll-table"
      >
        <template #cell(index)="data">
          {{ data.index + 1 }}
        </template>
      </b-table>
    </div>
  </div>
</div>
