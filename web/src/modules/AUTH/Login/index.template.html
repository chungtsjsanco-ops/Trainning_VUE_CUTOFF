<div class="login-page d-flex align-items-center justify-content-center">
  <div class="login-card card shadow-lg">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <h4 class="fw-bold text-primary">Đăng nhập</h4>
        <p class="text-muted small">Vui lòng nhập thông tin tài khoản</p>
      </div>

      <b-alert :show="loginFailed" variant="danger" dismissible @dismissed="loginFailed = false">
        Tên đăng nhập hoặc mật khẩu không đúng!
      </b-alert>

      <b-form @submit.prevent="btnLogin_Click">
        <b-form-group label="Tên đăng nhập" label-for="username">
          <b-form-input
            id="username"
            v-model.trim="username"
            placeholder="Nhập tên đăng nhập"
            :disabled="loading"
            autofocus
          />
        </b-form-group>

        <b-form-group label="Mật khẩu" label-for="password" class="mt-3">
          <b-form-input
            id="password"
            v-model="password"
            type="password"
            placeholder="Nhập mật khẩu"
            :disabled="loading"
          />
        </b-form-group>

        <b-button
          type="submit"
          variant="primary"
          class="w-100 mt-4"
          :disabled="loading || !username || !password"
        >
          <b-spinner small v-if="loading" class="mr-2" />
          {{ loading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
        </b-button>
      </b-form>
    </div>
  </div>
</div>
